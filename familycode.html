<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FamilyCode</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet"/>
<style>
:root[data-theme="dark"]{--bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);--text:#e8e8f0;--text2:#7a7a9a;--text3:#45455a;--accent:#7c6af7;--accent2:#a599ff;--accent-bg:rgba(124,106,247,0.12);--accent-border:rgba(124,106,247,0.3);--green:#3dffc0;--green-bg:rgba(61,255,192,0.08);--red:#ff5c7a;--grid:rgba(255,255,255,0.025)}
:root[data-theme="light"]{--bg:#f4f4f8;--bg2:#ffffff;--bg3:#ebebf3;--border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.14);--text:#0f0f1a;--text2:#606080;--text3:#b0b0c8;--accent:#5b4de8;--accent2:#7c6af7;--accent-bg:rgba(91,77,232,0.08);--accent-border:rgba(91,77,232,0.25);--green:#00b87a;--green-bg:rgba(0,184,122,0.08);--red:#e8335a;--grid:rgba(0,0,0,0.03)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:32px 32px}
.app{max-width:420px;margin:0 auto;min-height:100vh;padding:0 0 40px;position:relative}
.header{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 0;gap:8px}
.logo{display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;color:var(--accent2);letter-spacing:.04em}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.header-btns{display:flex;gap:8px}
.hbtn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;font-family:'JetBrains Mono',monospace;font-weight:700}
.hbtn:hover{border-color:var(--accent-border);color:var(--accent2)}
.screen{display:none;padding:24px 20px;animation:fadeIn .2s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.hero{margin:32px 0 28px}
.hero h1{font-size:32px;font-weight:800;letter-spacing:-.02em;line-height:1.1;margin-bottom:10px}
.hero h1 span{color:var(--accent2)}
.hero p{font-size:13px;color:var(--text2);line-height:1.6;font-family:'JetBrains Mono',monospace;font-weight:300}
.family-list{margin-bottom:24px}
.family-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;cursor:pointer;transition:border-color .2s,transform .15s;display:flex;align-items:center;justify-content:space-between;gap:12px}
.family-card:hover{border-color:var(--accent-border);transform:translateY(-1px)}
.family-card-name{font-size:15px;font-weight:700;margin-bottom:3px}
.family-card-id{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.08em}
.family-card-otp{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;letter-spacing:4px;color:var(--accent2);white-space:nowrap}
.family-card-lock{font-size:16px;opacity:.5}
.btn{width:100%;padding:14px;border-radius:12px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.01em}
.btn-primary{background:var(--accent);border:none;color:#fff;box-shadow:0 4px 20px rgba(124,106,247,.35)}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 6px 24px rgba(124,106,247,.45)}
.btn-primary:active{transform:translateY(0)}
.btn-ghost{background:var(--bg2);border:1px solid var(--border2);color:var(--text);margin-top:10px}
.btn-ghost:hover{background:var(--bg3)}
.back{display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text3);cursor:pointer;margin-bottom:24px;padding:6px 0;transition:color .2s;letter-spacing:.05em}
.back:hover{color:var(--text2)}
.field-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;color:var(--text3);text-transform:uppercase;margin-bottom:8px}
.field-input{width:100%;padding:13px 16px;border-radius:12px;border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-size:16px;font-family:'Syne',sans-serif;font-weight:500;margin-bottom:20px;transition:border-color .2s,box-shadow .2s;outline:none}
.field-input:focus{border-color:var(--accent-border);box-shadow:0 0 0 3px var(--accent-bg)}
.field-input::placeholder{color:var(--text3)}
/* PIN TOGGLE */
.pin-toggle-row{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:12px;cursor:pointer;transition:border-color .2s}
.pin-toggle-row:hover{border-color:var(--accent-border)}
.pin-toggle-left{display:flex;flex-direction:column;gap:3px}
.pin-toggle-title{font-size:14px;font-weight:700}
.pin-toggle-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3)}
.toggle{width:40px;height:22px;border-radius:11px;background:var(--border2);position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle-knob{width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:left .2s}
.toggle.on .toggle-knob{left:21px}
.pin-field-wrap{overflow:hidden;max-height:0;transition:max-height .3s ease}
.pin-field-wrap.open{max-height:120px}
/* OTP CARD */
.otp-card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:28px 24px 24px;text-align:center;position:relative;overflow:hidden}
.otp-card::before{content:'';position:absolute;top:-40px;left:50%;transform:translateX(-50%);width:200px;height:200px;background:radial-gradient(circle,var(--accent-bg) 0%,transparent 70%);pointer-events:none}
.otp-family-id{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);margin-bottom:20px;letter-spacing:.08em}
.otp-digits{font-family:'JetBrains Mono',monospace;font-size:52px;font-weight:700;letter-spacing:12px;color:var(--accent2);text-shadow:0 0 30px rgba(124,106,247,.4);margin-bottom:4px;line-height:1}
.otp-hint{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);margin-bottom:20px;letter-spacing:.04em}
.progress-bar{height:2px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:6px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width 1s linear}
.timer-text{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.08em}
.rename-row{display:flex;gap:8px;align-items:center;margin-bottom:20px}
.rename-row .field-input{margin:0;flex:1;font-size:15px}
.rename-btn{padding:13px 16px;border-radius:12px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .2s;font-weight:500}
.rename-btn:hover{border-color:var(--accent-border);color:var(--accent2)}
.url-section{margin-top:20px}
.url-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);word-break:break-all;cursor:pointer;transition:border-color .2s;line-height:1.6;margin:8px 0}
.url-box:hover{border-color:var(--accent-border);color:var(--text2)}
.url-accent{color:var(--accent2)}
.url-note{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);line-height:1.6;letter-spacing:.02em}
.status-badge{display:inline-flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;font-size:10px;padding:4px 10px;border-radius:20px;background:var(--green-bg);color:var(--green);border:1px solid rgba(61,255,192,.15);letter-spacing:.06em;margin-bottom:20px}
.status-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 2s infinite}
.section-title{font-size:22px;font-weight:800;letter-spacing:-.02em;margin-bottom:6px}
.section-sub{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text2);margin-bottom:28px;line-height:1.6;font-weight:300}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:10px 20px;border-radius:30px;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.04em;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:32px 0 24px}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.4}
.empty-text{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text3);line-height:1.6}
.hide-note{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);text-align:center;margin-top:12px;letter-spacing:.04em;line-height:1.6}
.lang-menu{display:none;position:absolute;right:20px;top:64px;background:var(--bg2);border:1px solid var(--border2);border-radius:12px;overflow:hidden;z-index:100;min-width:140px;box-shadow:0 8px 32px rgba(0,0,0,.25)}
.lang-menu.open{display:block}
.lang-item{padding:10px 16px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .15s}
.lang-item:hover{background:var(--bg3);color:var(--text)}
.lang-item.active{color:var(--accent2)}
/* PIN SCREEN */
.pin-screen-card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:32px 24px;text-align:center;margin-top:32px}
.pin-screen-icon{font-size:36px;margin-bottom:16px}
.pin-screen-title{font-size:20px;font-weight:800;margin-bottom:6px}
.pin-screen-sub{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);margin-bottom:24px;line-height:1.6}
.pin-dots{display:flex;gap:12px;justify-content:center;margin-bottom:28px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border2);transition:all .2s}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);box-shadow:0 0 8px var(--accent)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:260px;margin:0 auto}
.pin-key{padding:18px;border-radius:14px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;cursor:pointer;transition:all .15s;text-align:center}
.pin-key:hover{border-color:var(--accent-border);background:var(--accent-bg);color:var(--accent2)}
.pin-key:active{transform:scale(.93)}
.pin-key.del{font-size:16px;color:var(--text2)}
.pin-key.empty{border:none;background:transparent;cursor:default}
.pin-note{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);margin-top:20px;line-height:1.6}
.pin-badge{display:inline-flex;align-items:center;gap:4px;font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 8px;border-radius:20px;background:var(--accent-bg);color:var(--accent2);border:1px solid var(--accent-border);margin-left:6px;vertical-align:middle}
.info-box{background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:12px;padding:12px 14px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);line-height:1.6;margin-bottom:20px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo"><div class="logo-dot"></div>family_code</div>
    <div class="header-btns">
      <button class="hbtn" id="lang-btn">EN</button>
      <button class="hbtn" id="theme-btn">☀</button>
    </div>
  </div>
  <div class="lang-menu" id="lang-menu">
    <div class="lang-item" data-lang="it">🇮🇹 Italiano</div>
    <div class="lang-item" data-lang="en">🇬🇧 English</div>
    <div class="lang-item" data-lang="es">🇪🇸 Español</div>
    <div class="lang-item" data-lang="de">🇩🇪 Deutsch</div>
    <div class="lang-item" data-lang="fr">🇫🇷 Français</div>
  </div>

  <!-- HOME -->
  <div class="screen active" id="home">
    <div class="hero">
      <h1 id="hero-title"></h1>
      <p id="hero-sub"></p>
    </div>
    <div class="family-list" id="family-list"></div>
    <button class="btn btn-primary" id="btn-create"></button>
    <button class="btn btn-ghost" id="btn-join"></button>
  </div>

  <!-- CREATE -->
  <div class="screen" id="create-screen">
    <div class="back" id="back-create"></div>
    <div class="section-title" id="create-title"></div>
    <div class="section-sub" id="create-sub"></div>
    <div class="field-label" id="create-label"></div>
    <input class="field-input" id="new-name" maxlength="30" autocomplete="off"/>

    <!-- PIN TOGGLE -->
    <div class="pin-toggle-row" id="pin-toggle-row">
      <div class="pin-toggle-left">
        <div class="pin-toggle-title" id="pin-toggle-title"></div>
        <div class="pin-toggle-sub" id="pin-toggle-sub"></div>
      </div>
      <div class="toggle" id="pin-toggle"><div class="toggle-knob"></div></div>
    </div>
    <div class="pin-field-wrap" id="pin-field-wrap">
      <div class="info-box" id="pin-info-box"></div>
      <div class="field-label" id="create-pin-label"></div>
      <input class="field-input" id="new-pin" maxlength="16" type="password" autocomplete="off"/>
    </div>

    <button class="btn btn-primary" id="btn-do-create"></button>
  </div>

  <!-- JOIN -->
  <div class="screen" id="join-screen">
    <div class="back" id="back-join"></div>
    <div class="section-title" id="join-title"></div>
    <div class="section-sub" id="join-sub"></div>
    <div class="field-label" id="join-label"></div>
    <input class="field-input" id="join-code" autocomplete="off"/>
    <button class="btn btn-primary" id="btn-do-join"></button>
  </div>

  <!-- PIN ENTRY (keypad) -->
  <div class="screen" id="pin-screen">
    <div class="back" id="back-pin"></div>
    <div class="pin-screen-card">
      <div class="pin-screen-icon">🔐</div>
      <div class="pin-screen-title" id="pin-screen-title"></div>
      <div class="pin-screen-sub" id="pin-screen-sub"></div>
      <div class="pin-dots" id="pin-dots"></div>
      <div class="pin-pad" id="pin-pad"></div>
      <div class="pin-note" id="pin-note"></div>
    </div>
  </div>

  <!-- OTP -->
  <div class="screen" id="otp-screen">
    <div class="back" id="back-otp"></div>
    <div class="status-badge"><span class="status-dot"></span><span id="badge-text"></span></div>
    <div class="otp-card">
      <div class="rename-row">
        <input class="field-input" id="rename-input" maxlength="30"/>
        <button class="rename-btn" id="btn-rename"></button>
      </div>
      <div class="otp-family-id" id="otp-tail"></div>
      <div class="otp-digits" id="otp-display">------</div>
      <div class="otp-hint" id="otp-hint"></div>
      <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
      <div class="timer-text" id="timer-label"></div>
    </div>
    <div class="url-section">
      <div class="field-label" id="share-label"></div>
      <div class="url-box" id="share-url"></div>
      <div class="url-note" id="share-note"></div>
    </div>
    <div class="hide-note" id="hide-note"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>

const $=id=>document.getElementById(id);
function save(){localStorage.setItem(DB,JSON.stringify(fams))}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active')}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400)}
function hex(bytes){const a=new Uint8Array(bytes);crypto.getRandomValues(a);return Array.from(a).map(b=>b.toString(16).padStart(2,'0')).join('')}

function otp(secret,pin){
  const base=pin?secret+'::'+pin:secret;
  const t=Math.floor(Date.now()/30000);
  let h=0;const s=base+t;
  for(let i=0;i<s.length;i++)h=(Math.imul(31,h)+s.charCodeAt(i))|0;
  return String(Math.abs(h)%1000000).padStart(6,'0');
}

function left(){return 30-Math.floor(Date.now()/1000)%30}
function makeUrl(secret,name){return location.href.split('#')[0]+'#s='+secret+'&n='+encodeURIComponent(name)}
function fmtUrl(url){const hash=url.split('#')[1]||'';const base=url.split('#')[0].replace(/^https?:\/\//,'');return '<span style="color:var(--text3)">'+base+'#</span><span class="url-accent">'+hash.slice(0,26)+'…</span>'}

function applyLang(){
  const t=i18n[lang];
  $('hero-title').innerHTML=t.heroTitle;$('hero-sub').innerHTML=t.heroSub;
  $('btn-create').textContent=t.btnCreate;$('btn-join').textContent=t.btnJoin;
  $('create-title').textContent=t.createTitle;$('create-sub').innerHTML=t.createSub;
  $('create-label').textContent=t.createLabel;$('new-name').placeholder=t.namePh;
  $('btn-do-create').textContent=t.btnDoCreate;
  $('pin-toggle-title').textContent=t.pinToggleTitle;
  $('pin-toggle-sub').textContent=t.pinToggleSub;
  $('pin-info-box').textContent=t.pinInfo;
  $('create-pin-label').textContent=t.pinCreateLabel;
  $('join-title').textContent=t.joinTitle;$('join-sub').innerHTML=t.joinSub;
  $('join-label').textContent=t.joinLabel;$('join-code').placeholder=t.joinPh;
  $('btn-do-join').textContent=t.btnDoJoin;
  document.querySelectorAll('.back').forEach(b=>b.textContent=t.back);
  $('badge-text').textContent=t.badge;$('otp-hint').textContent=t.hint;
  $('btn-rename').textContent=t.renameBtn;$('share-label').textContent=t.shareLabel;
  $('share-note').innerHTML=t.shareNote;$('hide-note').textContent=t.hideNote;
  $('pin-screen-title').textContent=t.pinScreenTitle;
  $('pin-screen-sub').textContent=t.pinScreenSub;
  $('pin-note').textContent=t.pinNote;
  $('lang-btn').textContent=lang.toUpperCase();
  document.documentElement.lang=lang;
  document.querySelectorAll('.lang-item').forEach(el=>el.classList.toggle('active',el.dataset.lang===lang));
  renderHome();
}

function renderHome(){
  const t=i18n[lang];const list=$('family-list');
  if(!fams.length){list.innerHTML='<div class="empty"><div class="empty-icon">⬡</div><div class="empty-text">'+t.emptyText+'</div></div>';return}
  list.innerHTML=fams.map(f=>{
    const pin=sessionPins[f.id]||'';
    const code=otp(f.secret,pin);
    const lock=f.hasPin?'<span class="pin-badge">'+t.pinLockBadge+'</span>':'';
    return '<div class="family-card" onclick="cardClick(\''+f.id+'\')">'
      +'<div><div class="family-card-name">'+f.name+lock+'</div>'
      +'<div class="family-card-id">'+t.keyLbl+f.secret.slice(-8)+'</div></div>'
      +'<div class="family-card-otp">'+(f.hasPin&&!sessionPins[f.id]?'••••••':code)+'</div>'
      +'</div>';
  }).join('');
}

function cardClick(id){
  const f=fams.find(x=>x.id===id);
  if(f.hasPin&&!sessionPins[id]){showPinScreen(id);return}
  openFam(id);
}

/* ---- PIN KEYPAD ---- */
let pinBuffer='';
let pinMaxLen=0;

function showPinScreen(famId){
  pendingFamId=famId;
  pinBuffer='';
  pinMaxLen=0; // unknown length — confirm with ✓
  buildPinPad(false);
  show('pin-screen');
}

function showPinCreate(){
  pendingFamId='__create__';
  pinBuffer='';
  pinMaxLen=0;
  buildPinPad(true);
  show('pin-screen');
}

function buildPinPad(isCreate){
  // dots: show up to 8 positions, grow dynamically
  renderPinDots();
  const pad=$('pin-pad');
  const keys=['1','2','3','4','5','6','7','8','9','✓','0','⌫'];
  pad.innerHTML=keys.map(k=>{
    let cls='pin-key';
    if(k==='⌫')cls+=' del';
    if(k==='✓')cls+=' btn-primary';
    return '<button class="'+cls+'" data-k="'+k+'">'+k+'</button>';
  }).join('');
  pad.querySelectorAll('button').forEach(btn=>{
    btn.onclick=()=>pinKeyPress(btn.dataset.k);
  });
}

function renderPinDots(){
  const len=Math.max(pinBuffer.length,4);
  $('pin-dots').innerHTML=Array.from({length:len},(_,i)=>
    '<div class="pin-dot'+(i<pinBuffer.length?' filled':'')+'"></div>'
  ).join('');
}

function pinKeyPress(k){
  if(k==='⌫'){pinBuffer=pinBuffer.slice(0,-1);renderPinDots();return}
  if(k==='✓'){confirmPin();return}
  if(pinBuffer.length>=20)return;
  pinBuffer+=k;
  renderPinDots();
}

function confirmPin(){
  if(!pinBuffer){toast('// PIN?');return}
  if(pendingFamId==='__create__'){
    // store temporarily to be picked up by btn-do-create
    $('new-pin').value=pinBuffer;
    pinBuffer='';
    show('create-screen');
    toast('// PIN impostato');
    return;
  }
  sessionPins[pendingFamId]=pinBuffer;
  pinBuffer='';
  openFam(pendingFamId);
}

function openFam(id){
  cur=id;const f=fams.find(x=>x.id===id);const t=i18n[lang];
  $('rename-input').value=f.name;
  $('otp-tail').textContent=t.keyLbl+f.secret.slice(-8)+(f.hasPin?' 🔒':'');
  $('share-url').innerHTML=fmtUrl(makeUrl(f.secret,f.name));
  $('share-url').onclick=()=>navigator.clipboard.writeText(makeUrl(f.secret,f.name)).then(()=>toast(t.toastCopied)).catch(()=>toast(t.toastCopied));
  startTicker(f);show('otp-screen');
}

function startTicker(f){
  if(ticker)clearInterval(ticker);
  function tick(){
    const t=i18n[lang];
    const pin=sessionPins[f.id]||'';
    $('otp-display').textContent=otp(f.secret,pin);
    const tl=left();
    $('prog').style.width=(tl/30*100)+'%';
    $('timer-label').textContent='// '+t.timerPre+' '+tl+t.timerSuf;
  }
  tick();ticker=setInterval(tick,1000);
}

/* ---- PIN TOGGLE on create screen ---- */
$('pin-toggle-row').onclick=()=>{
  pinEnabled=!pinEnabled;
  $('pin-toggle').classList.toggle('on',pinEnabled);
  $('pin-field-wrap').classList.toggle('open',pinEnabled);
  if(!pinEnabled)$('new-pin').value='';
};

/* ---- THEME / LANG ---- */
$('theme-btn').onclick=()=>{const h=document.documentElement;const d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'light':'dark');$('theme-btn').textContent=d?'☽':'☀'};
$('lang-btn').onclick=e=>{e.stopPropagation();$('lang-menu').classList.toggle('open')};
document.addEventListener('click',()=>$('lang-menu').classList.remove('open'));
document.querySelectorAll('.lang-item').forEach(el=>el.onclick=()=>{lang=el.dataset.lang;localStorage.setItem('fc_lang',lang);$('lang-menu').classList.remove('open');applyLang();if(cur)openFam(cur)});

/* ---- NAVIGATION ---- */
$('btn-create').onclick=()=>{$('new-name').value='';$('new-pin').value='';pinEnabled=false;$('pin-toggle').classList.remove('on');$('pin-field-wrap').classList.remove('open');show('create-screen');setTimeout(()=>$('new-name').focus(),100)};
$('btn-join').onclick=()=>{$('join-code').value='';show('join-screen');setTimeout(()=>$('join-code').focus(),100)};
$('back-create').onclick=()=>{show('home');renderHome()};
$('back-join').onclick=()=>{show('home');renderHome()};
$('back-otp').onclick=()=>{if(ticker)clearInterval(ticker);cur=null;show('home');renderHome()};
$('back-pin').onclick=()=>{pinBuffer='';pendingFamId=null;show('home');renderHome()};

/* ---- CREATE ---- */
$('btn-do-create').onclick=()=>{
  const name=$('new-name').value.trim()||'Family';
  const pin=pinEnabled?$('new-pin').value.trim():'';
  const secret=hex(16),id=hex(4);
  fams.push({id,name,secret,hasPin:!!pin});
  if(pin)sessionPins[id]=pin;
  save();openFam(id);
};

/* ---- JOIN ---- */
$('btn-do-join').onclick=()=>{
  const t=i18n[lang];let raw=$('join-code').value.trim();
  let secret=raw,name='Family';
  if(raw.includes('#s=')){const p=new URLSearchParams(raw.split('#')[1]);secret=p.get('s')||raw;name=p.get('n')||'Family'}
  if(secret.length<16){toast(t.toastInvalid);return}
  const exists=fams.find(f=>f.secret===secret);
  if(exists){toast(t.toastAlready);cardClick(exists.id);return}
  const id=hex(4);
  // joining: we don't know if PIN is set — user will figure it out
  // mark hasPin=true only if they tell us; default false, they can set via settings
  fams.push({id,name,secret,hasPin:false});
  save();toast(t.toastAdded);openFam(id);
};

/* ---- RENAME ---- */
$('btn-rename').onclick=()=>{
  const t=i18n[lang];const val=$('rename-input').value.trim();if(!val)return;
  const f=fams.find(x=>x.id===cur);
  if(f){f.name=val;save();$('share-url').innerHTML=fmtUrl(makeUrl(f.secret,f.name));toast(t.toastRenamed);renderHome()}
};

/* ---- HASH ON LOAD ---- */
function checkHash(){
  const hash=location.hash;if(!hash||!hash.includes('s='))return;
  const p=new URLSearchParams(hash.slice(1));const secret=p.get('s'),name=p.get('n')||'Family';
  if(!secret||secret.length<16)return;
  const t=i18n[lang];const exists=fams.find(f=>f.secret===secret);
  if(exists){toast(t.toastWelcome+exists.name);setTimeout(()=>cardClick(exists.id),400);return}
  const id=hex(4);fams.push({id,name,secret,hasPin:false});save();
  toast(t.toastAdded);setTimeout(()=>openFam(id),400);
}

lang=localStorage.getItem('fc_lang')||(navigator.language||'en').slice(0,2).toLowerCase();
if(!i18n[lang])lang='en';
applyLang();checkHash();
</script>
