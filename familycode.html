<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#7c6af7"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FamilyCode"/>
<link rel="manifest" id="manifest-link"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>&#x1F510;</text></svg>"/>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%237c6af7'/><text x='50' y='72' text-anchor='middle' font-size='58'>&#x1F510;</text></svg>"/>
<title>FamilyCode</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<style>
:root[data-theme="dark"]{--bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);--text:#e8e8f0;--text2:#7a7a9a;--text3:#45455a;--accent:#7c6af7;--accent2:#a599ff;--accent-bg:rgba(124,106,247,0.12);--accent-border:rgba(124,106,247,0.3);--green:#3dffc0;--green-bg:rgba(61,255,192,0.08);--grid:rgba(255,255,255,0.025)}
:root[data-theme="light"]{--bg:#f4f4f8;--bg2:#ffffff;--bg3:#ebebf3;--border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.14);--text:#0f0f1a;--text2:#606080;--text3:#b0b0c8;--accent:#5b4de8;--accent2:#7c6af7;--accent-bg:rgba(91,77,232,0.08);--accent-border:rgba(91,77,232,0.25);--green:#00b87a;--green-bg:rgba(0,184,122,0.08);--grid:rgba(0,0,0,0.03)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:32px 32px}
.app{max-width:420px;margin:0 auto;min-height:100vh;padding:0 0 60px;position:relative}
.header{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 0;gap:8px}
.logo{display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;color:var(--accent2);letter-spacing:.04em;cursor:pointer}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.header-btns{display:flex;gap:8px}
.hbtn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;font-family:'JetBrains Mono',monospace;font-weight:700}
.hbtn:hover{border-color:var(--accent-border);color:var(--accent2)}
.screen{display:none;padding:24px 20px;animation:fadeIn .2s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.hero{margin:28px 0 24px}
.hero h1{font-size:30px;font-weight:800;letter-spacing:-.02em;line-height:1.1;margin-bottom:10px}
.hero h1 span{color:var(--accent2)}
.hero p{font-size:13px;color:var(--text2);line-height:1.6;font-family:'JetBrains Mono',monospace;font-weight:300}
.family-list{margin-bottom:20px}
.family-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;cursor:pointer;transition:border-color .2s,transform .15s;display:flex;align-items:center;justify-content:space-between;gap:12px;overflow:hidden}
.family-card:hover{border-color:var(--accent-border);transform:translateY(-1px)}
.family-card-info{min-width:0;flex:1;overflow:hidden}
.family-card-name{font-size:15px;font-weight:700;margin-bottom:3px;overflow-wrap:break-word;word-break:break-word}
.family-card-id{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.08em}
.family-card-otp{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;letter-spacing:3px;color:var(--accent2);white-space:nowrap;flex-shrink:0}
.family-card-del{width:28px;height:28px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .2s;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-weight:700}
.family-card-del:hover{border-color:rgba(255,92,122,0.5);color:#ff5c7a;background:rgba(255,92,122,0.08)}
.btn{width:100%;padding:14px;border-radius:12px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.01em}
.btn-primary{background:var(--accent);border:none;color:#fff;box-shadow:0 4px 20px rgba(124,106,247,.35)}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}
.btn-ghost{background:var(--bg2);border:1px solid var(--border2);color:var(--text);margin-top:10px}
.btn-ghost:hover{background:var(--bg3)}
.back{display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text3);cursor:pointer;margin-bottom:24px;padding:6px 0;transition:color .2s;letter-spacing:.05em}
.back:hover{color:var(--text2)}
.field-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;color:var(--text3);text-transform:uppercase;margin-bottom:8px}
.field-input{width:100%;padding:13px 16px;border-radius:12px;border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-size:16px;font-family:'Syne',sans-serif;font-weight:500;margin-bottom:20px;transition:border-color .2s,box-shadow .2s;outline:none}
.field-input:focus{border-color:var(--accent-border);box-shadow:0 0 0 3px var(--accent-bg)}
.field-input::placeholder{color:var(--text3)}
.otp-card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:28px 24px 24px;text-align:center;position:relative;overflow:hidden}
.otp-card::before{content:'';position:absolute;top:-40px;left:50%;transform:translateX(-50%);width:200px;height:200px;background:radial-gradient(circle,var(--accent-bg) 0%,transparent 70%);pointer-events:none}
.otp-family-id{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);margin-bottom:20px;letter-spacing:.08em}
.otp-digits{font-family:'JetBrains Mono',monospace;font-size:52px;font-weight:700;letter-spacing:12px;color:var(--accent2);text-shadow:0 0 30px rgba(124,106,247,.4);margin-bottom:4px;line-height:1}
.otp-hint{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);margin-bottom:20px;letter-spacing:.04em}
.progress-bar{height:2px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:6px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width 1s linear}
.timer-text{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.08em}
.rename-row{display:flex;gap:8px;align-items:center;margin-bottom:20px}
.rename-row .field-input{margin:0;flex:1;font-size:15px;overflow:hidden;text-overflow:ellipsis}
.rename-btn{padding:13px 16px;border-radius:12px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .2s;font-weight:500}
.rename-btn:hover{border-color:var(--accent-border);color:var(--accent2)}
.url-section{margin-top:20px}
.url-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);word-break:break-all;cursor:pointer;transition:border-color .2s;line-height:1.6;margin:8px 0}
.url-box:hover{border-color:var(--accent-border);color:var(--text2)}
.url-accent{color:var(--accent2)}
.url-note{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);line-height:1.6}
.status-badge{display:inline-flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;font-size:10px;padding:4px 10px;border-radius:20px;background:var(--green-bg);color:var(--green);border:1px solid rgba(61,255,192,.15);letter-spacing:.06em;margin-bottom:20px}
.status-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 2s infinite}
.section-title{font-size:22px;font-weight:800;letter-spacing:-.02em;margin-bottom:6px}
.section-sub{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text2);margin-bottom:28px;line-height:1.6;font-weight:300}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:10px 20px;border-radius:30px;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.04em;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:32px 0 24px}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.4}
.empty-text{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text3);line-height:1.6}
.hide-note{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);text-align:center;margin-top:12px;letter-spacing:.04em;line-height:1.6}
.lang-menu{display:none;position:absolute;right:20px;top:64px;background:var(--bg2);border:1px solid var(--border2);border-radius:12px;overflow:hidden;z-index:100;min-width:140px;box-shadow:0 8px 32px rgba(0,0,0,.25)}
.lang-menu.open{display:block}
.lang-item{padding:10px 16px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .15s}
.lang-item:hover{background:var(--bg3);color:var(--text)}
.lang-item.active{color:var(--accent2)}
.pin-card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:18px 20px 14px;text-align:center;margin-top:10px}
.pin-card-icon{font-size:24px;margin-bottom:6px}
.pin-card-title{font-size:16px;font-weight:800;margin-bottom:4px}
.pin-card-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text2);margin-bottom:8px;line-height:1.5;white-space:pre-line}
.pin-warning{background:rgba(255,180,0,0.08);border:1px solid rgba(255,180,0,0.35);border-radius:10px;padding:8px 11px;font-family:'JetBrains Mono',monospace;font-size:10px;color:#f0a800;line-height:1.5;margin-bottom:10px;text-align:left;white-space:pre-line}
:root[data-theme="light"] .pin-warning{background:rgba(200,120,0,0.07);border-color:rgba(200,120,0,0.3);color:#a06000}
.pin-dots{display:flex;gap:10px;justify-content:center;margin-bottom:14px;min-height:16px}
.pin-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--border2);transition:all .15s}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);box-shadow:0 0 8px var(--accent)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:240px;margin:0 auto 10px}
.pin-key{padding:13px;border-radius:12px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;cursor:pointer;transition:all .15s;text-align:center;user-select:none}
.pin-key:hover{border-color:var(--accent-border);background:var(--accent-bg);color:var(--accent2)}
.pin-key:active{transform:scale(.92)}
.pin-key.del{font-size:16px;color:var(--text2)}
.pin-key.confirm{background:var(--accent);border-color:var(--accent);color:#fff;font-size:16px}
.pin-key.confirm:hover{background:var(--accent2)}
.pin-note{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);line-height:1.5;white-space:pre-line}
#pin-screen{padding-top:12px;padding-bottom:12px}
#pin-screen .back{margin-bottom:8px}
.pin-badge{display:inline-flex;align-items:center;gap:4px;font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 8px;border-radius:20px;background:var(--accent-bg);color:var(--accent2);border:1px solid var(--accent-border);margin-left:6px;vertical-align:middle}
.guide-step{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:6px;display:flex;gap:16px;align-items:flex-start}
.guide-step-num{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--accent2);background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:8px;padding:4px 9px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.guide-step-body{}
.guide-step-title{font-size:14px;font-weight:700;margin-bottom:4px}
.guide-step-desc{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);line-height:1.6}
.guide-illustration{width:100%;border-radius:12px;margin-bottom:16px;overflow:hidden;background:var(--bg2);border:1px solid var(--border)}
.guide-tip{background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:12px;padding:12px 14px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);line-height:1.6;margin-bottom:20px}
.print-overlay{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;overflow-y:auto;padding:24px 20px 40px}
.print-overlay.active{display:block}
.print-area{background:#fff;border-radius:18px;padding:36px 28px;color:#111;text-align:center}
@media print{
 body>*{display:none!important}
 .print-overlay{display:block!important;position:static!important;background:#fff}
 .print-area{border-radius:0;padding:20px}
 .back,.btn,.hbtn{display:none!important}
}
.del-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:500;align-items:center;justify-content:center;padding:20px}
.del-overlay.open{display:flex}
.del-box{background:var(--bg2);border:1px solid var(--border2);border-radius:18px;padding:28px 24px;max-width:360px;width:100%;text-align:center}
.del-title{font-size:18px;font-weight:800;margin-bottom:14px;color:var(--text)}
.del-msg{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);line-height:1.7;margin-bottom:22px;text-align:left;white-space:pre-line}
.del-btns{display:flex;gap:10px}
.del-btns .btn{flex:1;padding:12px;font-size:13px}
.btn-danger{background:#ff5c7a;border:none;color:#fff;border-radius:12px;font-family:'Syne',sans-serif;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(255,92,122,0.3);transition:all .2s}
.btn-danger:hover{background:#ff7a94;transform:translateY(-1px)}
.app-footer{text-align:center;padding:40px 20px 28px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.04em}
.app-footer a{color:var(--text3);text-decoration:none;transition:color .2s}
.app-footer a:hover{color:var(--accent2);text-decoration:underline}
.footer-dev{margin-bottom:10px}
.footer-opensource{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.footer-opensource a{display:inline-flex;align-items:center;gap:5px;color:var(--accent2);text-decoration:none;padding:4px 10px;border-radius:20px;background:var(--accent-bg);border:1px solid var(--accent-border);transition:all .2s;font-size:10px}
.footer-opensource a:hover{background:var(--accent-border);color:#fff;text-decoration:none}
.footer-opensource a svg{width:13px;height:13px;fill:currentColor}
.footer-opensource-label{color:var(--text3);font-size:10px}
.footer-divider{width:40px;height:1px;background:var(--border2);margin:16px auto}
.footer-disclaimer{font-size:9px;color:var(--text3);line-height:1.7;max-width:340px;margin:0 auto;opacity:.7}
.install-card{background:var(--bg2);border:1px solid var(--accent-border);border-radius:14px;padding:20px;margin-top:16px;text-align:center;position:relative;overflow:hidden}
.install-card::before{content:'';position:absolute;top:-30px;left:50%;transform:translateX(-50%);width:140px;height:140px;background:radial-gradient(circle,var(--accent-bg) 0%,transparent 70%);pointer-events:none}
.install-card-icon{font-size:28px;margin-bottom:8px;position:relative}
.install-card-title{font-size:14px;font-weight:700;margin-bottom:6px;position:relative}
.install-card-desc{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);line-height:1.8;margin-bottom:14px;position:relative;white-space:pre-line}
.install-card-desc span{color:var(--accent2);font-weight:500}
.install-card .btn{font-size:13px;padding:12px;position:relative}
.install-card-close{position:absolute;top:10px;right:12px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;font-family:'JetBrains Mono',monospace;padding:4px;transition:color .2s}
.install-card-close:hover{color:var(--text)}
.guide-block{margin-bottom:6px}
.guide-connector{text-align:center;padding:8px 0;color:var(--text3);font-size:18px;opacity:.3;letter-spacing:.1em}
.scan-overlay{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;padding:20px;overflow-y:auto}
.scan-overlay.open{display:block}
.scan-box{max-width:420px;margin:0 auto}
#scan-video{width:100%;border-radius:14px;border:2px solid var(--accent-border);background:#000;display:block;margin-top:16px}
.scan-hint{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);text-align:center;margin-top:12px;line-height:1.6}
</style>
</head>
<body>
<div class="app">
 <div class="header">
  <div class="logo" id="logo"><div class="logo-dot"></div>family_code</div>
  <div class="header-btns">
   <button class="hbtn" id="btn-guide-open" title="Guida">?</button>
   <button class="hbtn" id="lang-btn">EN</button>
   <button class="hbtn" id="theme-btn">☀</button>
  </div>
 </div>
 <div class="lang-menu" id="lang-menu">
  <div class="lang-item" data-lang="it">🇮🇹 Italiano</div>
  <div class="lang-item" data-lang="en">🇬🇧 English</div>
  <div class="lang-item" data-lang="es">🇪🇸 Español</div>
  <div class="lang-item" data-lang="de">🇩🇪 Deutsch</div>
  <div class="lang-item" data-lang="fr">🇫🇷 Français</div>
<div class="lang-item" data-lang="ja">🇯🇵 日本語</div>
<div class="lang-item" data-lang="zh">🇨🇳 中文</div>
<div class="lang-item" data-lang="hi">🇮🇳 हिन्दी</div>
<div class="lang-item" data-lang="ar">🇸🇦 العربية</div>
<div class="lang-item" data-lang="pt">🇧🇷 Português</div>
<div class="lang-item" data-lang="ru">🇷🇺 Русский</div>
<div class="lang-item" data-lang="ko">🇰🇷 한국어</div>
 </div>
 <div class="screen active" id="home">
  <div class="hero"><h1 id="hero-title"></h1><p id="hero-sub"></p></div>
  <div class="family-list" id="family-list"></div>
  <button class="btn btn-primary" id="btn-create"></button>
  <button class="btn btn-ghost" id="btn-join"></button>
<div class="install-card" id="install-card" style="display:none">
 <button class="install-card-close" id="install-close">&times;</button>
 <div class="install-card-icon">📲</div>
 <div class="install-card-title" id="install-title"></div>
 <div class="install-card-desc" id="install-desc"></div>
 <button class="btn btn-primary" id="install-btn" style="display:none"></button>
</div>
 </div>
 <div class="screen" id="create-screen">
  <div class="back" id="back-create"></div>
  <div class="section-title" id="create-title"></div>
  <div class="section-sub" id="create-sub"></div>
  <div class="field-label" id="create-label"></div>
  <input class="field-input" id="new-name" maxlength="30" autocomplete="off"/>
  <button class="btn btn-primary" id="btn-do-create"></button>
 </div>
 <div class="screen" id="join-screen">
  <div class="back" id="back-join"></div>
  <div class="section-title" id="join-title"></div>
  <div class="section-sub" id="join-sub"></div>
  <div class="field-label" id="join-label"></div>
  <input class="field-input" id="join-code" autocomplete="off"/>
   <button class="btn btn-ghost" id="btn-scan-qr" style="margin-bottom:10px;display:none;justify-content:center;align-items:center;gap:8px"></button>
   <input type="file" id="scan-file-input" accept="image/*" style="display:none"/>
  <button class="btn btn-primary" id="btn-do-join"></button>
 </div>

function otp(secret,pin){
 const base=secret+'::'+pin;
 const t=Math.floor(Date.now()/(OTP_WINDOW*1000));
 const s=base+':'+t;
 let h=0x811c9dc5;
 for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,0x01000193)}
 h=Math.imul(h^(h>>>16),0x45d9f3b);
 h=Math.imul(h^(h>>>13),0x45d9f3b);
 h=(h^(h>>>16))>>>0;
 return String(h%1000000).padStart(6,'0');
}
function left(){return OTP_WINDOW-(Math.floor(Date.now()/1000)%OTP_WINDOW)}
function makeUrl(secret,name){return location.href.split('#')[0]+'#s='+secret+'&n='+encodeURIComponent(name)}
function fmtUrl(url){const hash=url.split('#')[1]||'';const base=url.split('#')[0].replace(/^https?:\/\//,'');return '<span style="color:var(--text3)">'+base+'#</span><span class="url-accent">'+hash.slice(0,26)+'…</span>'}

/* ========== PIN KEYPAD ========== */
function showPinKeypad(mode,famId){
 pinMode=mode;pinPendingId=famId;pinBuffer='';
 const t=i18n[lang];
 if(mode==='create'){
  $('pin-icon').textContent=t.pinCreateIcon;
  $('pin-screen-title').textContent=t.pinCreateTitle;
  $('pin-screen-sub').textContent=t.pinCreateSub;
  $('pin-note').textContent=t.pinCreateNote;
 }else{
  $('pin-icon').textContent=t.pinOpenIcon;
  $('pin-screen-title').textContent=t.pinOpenTitle;
  $('pin-screen-sub').textContent=t.pinOpenSub;
  $('pin-note').textContent=t.pinOpenNote;
 }
 $('pin-warning').textContent=t.pinWarning;
 renderPinDots();buildPinPad();showScreen('pin-screen');
}
function renderPinDots(){
 const len=4;
 $('pin-dots').innerHTML=Array.from({length:len},(_,i)=>
  '<div class="pin-dot'+(i<pinBuffer.length?' filled':'')+'"></div>'
 ).join('');
}
function buildPinPad(){
 const t=i18n[lang];
 const keys=['1','2','3','4','5','6','7','8','9',t.pinConfirm,'0',t.pinDel];
 $('pin-pad').innerHTML=keys.map(k=>{
  let cls='pin-key';
  if(k===t.pinDel)cls+=' del';
  if(k===t.pinConfirm)cls+=' confirm';
  return '<button class="'+cls+'" data-k="'+k+'">'+k+'</button>';
 }).join('');
 $('pin-pad').querySelectorAll('button').forEach(btn=>btn.onclick=()=>pinPress(btn.dataset.k));
}
function pinPress(k){
 const t=i18n[lang];
 if(k===t.pinDel){pinBuffer=pinBuffer.slice(0,-1);renderPinDots();return}
 if(k===t.pinConfirm){pinConfirm();return}
 if(pinBuffer.length>=4)return;
 pinBuffer+=k;renderPinDots();
}
function pinConfirm(){
 if(pinBuffer.length<4){toast('// PIN: 4');return}
 if(pinMode==='create'){
  const name=window._pendingName||'Family';
  const secret=hex(16),id=hex(4);
  fams.push({id,name,secret});
  sessionPins[id]=pinBuffer;
  save();pinBuffer='';window._pendingName=null;
  openFam(id);
 }else{
  sessionPins[pinPendingId]=pinBuffer;
  pinBuffer='';
  openFam(pinPendingId);
 }
}

 $('guide-title').textContent=t.guideTitle;
 $('guide-intro').textContent=t.guideIntro;
 $('guide-tip').textContent=t.guideTip;
 $('guide-steps').innerHTML=svgs.map((svg,i)=>{
  var s=t.guideSteps[i];

   +'<div class="guide-illustration">'+svg+'</div>'
   +'<div class="guide-step">'
   +'<div class="guide-step-num">'+s.n+'</div>'

   +'<div class="guide-step-desc">'+s.desc+'</div></div></div>'
   +'</div>';
  if(i<svgs.length-1)block+='<div class="guide-connector">\u2193</div>';

 }).join('');
}

 $('footer-os-label').textContent=t.footerOsLabel;$('footer-disclaimer').textContent=t.footerDisclaimer;if($('btn-scan-qr'))$('btn-scan-qr').textContent=t.btnScanQr;renderInstallCard();showScanBtn();
 buildGuide();renderHome();
}
$('theme-btn').onclick=()=>{const h=document.documentElement;const d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'light':'dark');$('theme-btn').textContent=d?'☽':'☀'};
$('lang-btn').onclick=e=>{e.stopPropagation();$('lang-menu').classList.toggle('open')};
document.addEventListener('click',()=>$('lang-menu').classList.remove('open'));

/* ========== HOME ========== */
function renderHome(){
 const t=i18n[lang];const list=$('family-list');
 if(!fams.length){list.innerHTML='<div class="empty"><div class="empty-icon">⬡</div><div class="empty-text">'+t.emptyText+'</div></div>';return}
 list.innerHTML=fams.map(f=>{
  const pin=sessionPins[f.id]||'';
  const locked=!sessionPins[f.id];
  const code=locked?'••••••':otp(f.secret,pin);
  return '<div class="family-card" onclick="cardClick(\''+f.id+'\')">'
   +'<div class="family-card-info"><div class="family-card-name">'+f.name+' <span class="pin-badge">🔒 PIN</span></div>'
   +'<div class="family-card-id">'+t.keyLbl+f.secret.slice(-8)+'</div></div>'
   +'<div class="family-card-otp">'+code+'</div>'
   +'<button class="family-card-del" onclick="deleteFam(\''+f.id+'\',event)" title="×">×</button></div>';
 }).join('');
}

function deleteFam(id,e){
 e.stopPropagation();
 pendingDeleteId=id;
 var t=i18n[lang];
 $('del-title').textContent=t.deleteTitle;
 $('del-msg').textContent=t.deleteWarning;
 $('del-cancel-btn').textContent=t.deleteCancel;
 $('del-confirm-btn').textContent=t.deleteConfirm;
 $('del-overlay').classList.add('open');
}

function cardClick(id){
 if(!sessionPins[id]){showPinKeypad('open',id);return}
 openFam(id);
}

/* ========== OPEN FAMILY ========== */
function openFam(id){
 cur=id;const f=fams.find(x=>x.id===id);const t=i18n[lang];
 $('rename-input').value=f.name;
 $('otp-tail').textContent=t.keyLbl+f.secret.slice(-8)+' 🔒';
 $('share-url').innerHTML=fmtUrl(makeUrl(f.secret,f.name));
 $('share-url').onclick=()=>navigator.clipboard.writeText(makeUrl(f.secret,f.name)).then(()=>toast(t.toastCopied)).catch(()=>toast(t.toastCopied));
 startTicker(f);showScreen('otp-screen');
}
function startTicker(f){
 if(ticker)clearInterval(ticker);
 function tick(){
  const t=i18n[lang];const pin=sessionPins[f.id]||'';
  $('otp-display').textContent=otp(f.secret,pin);
  const tl=left();
  $('prog').style.width=(tl/OTP_WINDOW*100)+'%';
  $('timer-label').textContent='// '+t.timerPre+' '+tl+t.timerSuf;
 }
 tick();ticker=setInterval(tick,1000);
}

/* ========== PRINT ========== */
function openPrint(withPin){
 const f=fams.find(x=>x.id===cur);if(!f)return;
 const t=i18n[lang];
 const url=makeUrl(f.secret,f.name);
 const pin=sessionPins[f.id]||'';
 $('print-name').textContent=f.name;
 $('print-keytail').textContent=t.keyLbl+f.secret.slice(-8)+' 🔒';
 $('print-scan').textContent=t.printScan;
 $('print-footer').textContent=t.printFooter;
 $('print-pin-label').textContent=t.printPinLabel;
 $('print-pin-note').textContent=t.printPinNote;
 $('print-tip').textContent=t.printTip;
 $('btn-do-print').textContent=t.btnDoPrint;
 const qrUrl='https://api.qrserver.com/v1/create-qr-code/?size=200x200&data='+encodeURIComponent(url);
 $('print-qr-img').src=qrUrl;
 if(withPin&&pin){
  $('print-pin-section').style.display='block';
  $('print-pin-value').textContent=pin;
 }else{
  $('print-pin-section').style.display='none';
 }
 showOverlay();
}
$('btn-print-pin').onclick=function(){openPrint(true)};
$('btn-print-nopin').onclick=function(){openPrint(false)};
$('btn-do-print').onclick=()=>window.print();
$('back-print').onclick=hideOverlay;

/* ========== NAVIGATION ========== */
$('btn-guide-open').onclick=()=>{buildGuide();showScreen('guide-screen')};
$('back-guide').onclick=()=>{showScreen('home');renderHome()};
$('logo').onclick=()=>{if(ticker)clearInterval(ticker);cur=null;hideOverlay();$('del-overlay').classList.remove('open');showScreen('home');renderHome()};
$('btn-create').onclick=()=>{$('new-name').value='';showScreen('create-screen');setTimeout(()=>$('new-name').focus(),100)};
$('btn-join').onclick=()=>{$('join-code').value='';showScreen('join-screen');setTimeout(()=>$('join-code').focus(),100)};
$('back-create').onclick=()=>{showScreen('home');renderHome()};
$('back-join').onclick=()=>{showScreen('home');renderHome()};
$('back-otp').onclick=()=>{if(ticker)clearInterval(ticker);cur=null;showScreen('home');renderHome()};
$('back-pin').onclick=()=>{
 pinBuffer='';
 if(pinMode==='create')showScreen('create-screen');
 else{showScreen('home');renderHome();}
};
$('btn-do-create').onclick=()=>{
 const name=$('new-name').value.trim()||'Family';
 window._pendingName=name;
 showPinKeypad('create',null);
};
$('btn-do-join').onclick=()=>{
 const t=i18n[lang];let raw=$('join-code').value.trim();
 let secret=raw,name='Family';
 if(raw.includes('#s=')){const p=new URLSearchParams(raw.split('#')[1]);secret=p.get('s')||raw;name=p.get('n')||'Family'}
 if(secret.length<16){toast(t.toastInvalid);return}
 const exists=fams.find(f=>f.secret===secret);
 if(exists){toast(t.toastAlready);cardClick(exists.id);return}
 const id=hex(4);fams.push({id,name,secret});save();
 toast(t.toastAdded);
 showPinKeypad('open',id);
};
$('btn-rename').onclick=()=>{
 const t=i18n[lang];const val=$('rename-input').value.trim();if(!val)return;
 const f=fams.find(x=>x.id===cur);
 if(f){f.name=val;save();$('share-url').innerHTML=fmtUrl(makeUrl(f.secret,f.name));toast(t.toastRenamed);renderHome()}
};
function checkHash(){
 const hash=location.hash;if(!hash||!hash.includes('s='))return;
 const p=new URLSearchParams(hash.slice(1));
 const secret=p.get('s'),name=p.get('n')||'Family';
 if(!secret||secret.length<16)return;
 const t=i18n[lang];
 const exists=fams.find(f=>f.secret===secret);
 if(exists){
  toast(t.toastWelcome+exists.name);
  setTimeout(()=>cardClick(exists.id),400);
  return;
 }
 const id=hex(4);fams.push({id,name,secret});save();
 toast(t.toastAdded);
 setTimeout(()=>showPinKeypad('open',id),400);
}

/* delete modal handlers */
$('del-cancel-btn').onclick=function(){$('del-overlay').classList.remove('open');pendingDeleteId=null;};
$('del-confirm-btn').onclick=function(){
 if(pendingDeleteId){
  fams=fams.filter(function(f){return f.id!==pendingDeleteId;});
  delete sessionPins[pendingDeleteId];
  save();pendingDeleteId=null;
 }
 $('del-overlay').classList.remove('open');
 renderHome();
};
$('del-overlay').onclick=function(e){if(e.target===$('del-overlay')){$('del-overlay').classList.remove('open');pendingDeleteId=null;}};

/* ========== PWA INSTALL ========== */
let deferredPrompt=null;
const isIos=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
const isStandalone=window.matchMedia('(display-mode:standalone)').matches||navigator.standalone;

function renderInstallCard(){
 const card=$('install-card');
 if(!card)return;
 if(isStandalone||localStorage.getItem('fc_pwa_dismissed')){card.style.display='none';return}
 const t=i18n[lang];
 $('install-title').textContent=t.installTitle;
 const btn=$('install-btn');
 if(isIos){
  $('install-desc').innerHTML=t.installDesc+'\n'+t.installIos;
  btn.style.display='none';
 }else if(deferredPrompt){
  $('install-desc').textContent=t.installDesc;
  btn.textContent=t.installBtn;
  btn.style.display='block';
 }else{
  $('install-desc').textContent=t.installDesc;
  btn.textContent=t.installBtn;
  btn.style.display='none';
 }
 card.style.display='block';
}

window.addEventListener('beforeinstallprompt',function(e){
 e.preventDefault();deferredPrompt=e;renderInstallCard();
});

document.getElementById('install-btn').onclick=function(){
 if(!deferredPrompt)return;
 deferredPrompt.prompt();
 deferredPrompt.userChoice.then(function(r){
  deferredPrompt=null;
  if(r.outcome==='accepted')$('install-card').style.display='none';
 });
};

document.getElementById('install-close').onclick=function(){
 $('install-card').style.display='none';
 localStorage.setItem('fc_pwa_dismissed','1');
};

window.addEventListener('appinstalled',function(){$('install-card').style.display='none'});

/* ========== QR SCANNER (jsQR live camera) ========== */
let scanStream=null;
let scanTimer=null;

function showScanBtn(){
 var b=$('btn-scan-qr');
 if(b)b.style.display='flex';
}

function openScanner(){
 var t=i18n[lang];
 $('scan-hint').textContent=t.scanHint;
 $('back-scan').textContent=t.back;
 if(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia){
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}).then(function(stream){
   scanStream=stream;
   var video=$('scan-video');
   video.srcObject=stream;
   video.setAttribute('playsinline','true');
   video.play();
   $('scan-overlay').classList.add('open');
   var c=document.createElement('canvas');
   var ctx=c.getContext('2d',{willReadFrequently:true});
   function detect(){
    if(!scanStream)return;
    if(video.readyState===video.HAVE_ENOUGH_DATA&&video.videoWidth>0){
     c.width=video.videoWidth;c.height=video.videoHeight;
     ctx.drawImage(video,0,0,c.width,c.height);
     var imageData=ctx.getImageData(0,0,c.width,c.height);
     if(typeof jsQR==='function'){
      var code=jsQR(imageData.data,c.width,c.height,{inversionAttempts:'dontInvert'});
      if(code&&code.data&&code.data.includes('#s=')){
       $('join-code').value=code.data;
       closeScanner();
       $('btn-do-join').click();
       return;
      }
     }
    }
    scanTimer=setTimeout(detect,250);
   }
   video.onloadedmetadata=function(){scanTimer=setTimeout(detect,500)};
  }).catch(function(){
   $('scan-file-input').click();
  });
 }else{
  $('scan-file-input').click();
 }
}

function closeScanner(){
 if(scanTimer){clearTimeout(scanTimer);scanTimer=null}
 if(scanStream){scanStream.getTracks().forEach(function(tk){tk.stop()});scanStream=null}
 $('scan-overlay').classList.remove('open');
 var v=$('scan-video');if(v){v.pause();v.srcObject=null}
}

$('scan-file-input').onchange=function(e){
 var file=e.target.files[0];
 if(!file)return;
 var img=new Image();
 img.onload=function(){
  var c=document.createElement('canvas');
  c.width=img.width;c.height=img.height;
  var ctx=c.getContext('2d');
  ctx.drawImage(img,0,0);
  var imageData=ctx.getImageData(0,0,c.width,c.height);
  if(typeof jsQR==='function'){
   var code=jsQR(imageData.data,c.width,c.height);
   if(code&&code.data&&code.data.includes('#s=')){
    $('join-code').value=code.data;
    $('btn-do-join').click();
    return;
   }
  }
  toast('// QR non riconosciuto');
 };
 img.src=URL.createObjectURL(file);
 e.target.value='';
};

if($('btn-scan-qr'))$('btn-scan-qr').onclick=openScanner;
if($('back-scan'))$('back-scan').onclick=closeScanner;

lang=localStorage.getItem('fc_lang')||(navigator.language||'en').slice(0,2).toLowerCase();if(!i18n[lang])lang='en';
applyLang();checkHash();
